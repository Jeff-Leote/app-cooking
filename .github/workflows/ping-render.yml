name: Keep Render Awake

on:
  schedule:
    # Toutes les 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping frontend health endpoint
        run: |
          echo "Pinging frontend..."
          curl -sS -L --max-time 30 --retry 3 --retry-delay 3 --fail \
            "https://app-cooking-1-puk2.onrender.com/healthz" \
            -o /dev/null
          echo "Frontend OK"

      - name: Ping backend summary endpoint (cold start tolerant)
        continue-on-error: true
        run: |
          echo "Pinging backend..."
          # Warm-up request (peut timeouter pendant le réveil)
          curl -sS -L --max-time 40 "https://app-cooking-22fr.onrender.com/" -o /dev/null || true
          sleep 20
          # Ping API principal avec timeout/retry plus permissifs
          curl -sS -L --max-time 120 --retry 5 --retry-delay 5 --retry-all-errors --fail \
            "https://app-cooking-22fr.onrender.com/api/dashboard/summary" \
            -o /dev/null
          echo "Backend OK"
